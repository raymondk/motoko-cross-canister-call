canisters:

  # build the map canister
  - name: greeter
    build:
      steps:
        - type: script
          commands:
            - mops build greeter
            - cp .mops/.build/greeter.wasm "$ICP_WASM_OUTPUT_PATH"

  # build the test canister
  - name: test
    build:
      steps:
        - type: script
          commands:
            - mops build test
            - cp .mops/.build/test.wasm "$ICP_WASM_OUTPUT_PATH"


